<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batcave Dashboard 🦇</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --border: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 24px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background-color: var(--bg-card);
            padding: 20px 32px;
            border-radius: 12px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 { margin: 0; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        header p { margin: 4px 0 0 0; color: var(--text-muted); font-size: 14px; }

        /* Layout Responsivo usando Tablas de Bloque para compatibilidad */
        .dashboard-grid {
            display: table;
            width: 100%;
            border-collapse: separate;
            border-spacing: 24px 0;
            margin: 0 -24px;
        }

        .main-content {
            display: table-cell;
            width: 72%;
            vertical-align: top;
        }

        .sidebar {
            display: table-cell;
            width: 28%;
            vertical-align: top;
        }

        .card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.2);
        }

        .card h2 {
            margin-top: 0;
            font-size: 16px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
            margin-bottom: 20px;
        }

        /* Estilos del Commander's Log */
        .log-item { margin-bottom: 20px; }
        .log-item strong { display: block; font-size: 12px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }
        .log-item p { margin: 0; font-size: 15px; color: var(--text-main); }
        .log-item ul { margin: 0; padding-left: 20px; color: var(--text-main); font-size: 14px; }
        .log-item li { margin-bottom: 6px; }
        
        .checkbox-container { display: flex; align-items: center; margin-bottom: 6px; }
        .checkbox-container input { margin-right: 8px; accent-color: var(--accent); }

        /* Estilos para tablas HTML dinámicas */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: left; }
        th { padding: 12px; background-color: #111827; color: var(--accent); border-bottom: 2px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid var(--border); color: var(--text-main); }
        tr:hover { background-color: #334155; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>BATCAVE DASHBOARD 🦇</h1>
            <p>Academic Mission Control • Monitoreo Automatizado</p>
        </div>
    </header>

    <div class="dashboard-grid">
        <div class="main-content">
            <div class="card">
                <h2>Publications Progress</h2>
                <div id="chart-publications"></div>
            </div>

            <div class="card">
                <h2>Grant Pipeline</h2>
                <div id="chart-grants"></div>
            </div>

            <div class="card">
                <h2>Opportunities Log</h2>
                <div class="table-wrapper" id="table-opportunities">
                    <p style="color: var(--text-muted);">Cargando oportunidades...</p>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="card">
                <h2>Daily Commander’s Log</h2>
                <div class="log-item">
                    <strong>Morning Oath</strong>
                    <p><em>Sign your name</em></p>
                </div>
                <div class="log-item">
                    <strong>Top 3 Priorities</strong>
                    <div class="checkbox-container"><input type="checkbox" id="p1"> <label for="p1">Write section of paper</label></div>
                    <div class="checkbox-container"><input type="checkbox" id="p2"> <label for="p2">Draft grant intro</label></div>
                    <div class="checkbox-container"><input type="checkbox" id="p3"> <label for="p3">Email collaborator</label></div>
                </div>
                <div class="log-item">
                    <strong>Evening Reflection</strong>
                    <p>Submitted draft to co-author</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Configuración estética común para los gráficos oscuros
    const layoutTemplate = {
        paper_bgcolor: 'rgba(0,0,0,0)',
        plot_bgcolor: 'rgba(0,0,0,0)',
        font: { color: '#f8fafc', family: 'sans-serif' },
        margin: { t: 40, r: 20, l: 60, b: 40 }
    };

    // 1. CARGAR Y PROCESAR PUBLICACIONES
    Papa.parse('/batcave-dashboard/data/publications.csv', {
        download: true,
        header: true,
        complete: function(results) {
            const data = results.data;
            // Contar estados
            const counts = {};
            data.forEach(row => {
                if(row.Status) counts[row.Status] = (counts[row.Status] || 0) + 1;
            });

            const trace = {
                x: Object.keys(counts),
                y: Object.values(counts),
                type: 'bar',
                marker: { color: '#38bdf8' }
            };

            const layout = { ...layoutTemplate, title: 'Estado Actual de Artículos', yaxis: { gridcolor: '#334155' } };
            Plotly.newPlot('chart-publications', [trace], layout);
        }
    });

    // 2. CARGAR Y PROCESAR GRANTS (GANTT)
    Papa.parse('/batcave-dashboard/data/grants.csv', {
        download: true,
        header: true,
        complete: function(results) {
            const data = results.data.filter(row => row.Grant && row.Start && row.Deadline);
            
            const traces = [];
            data.forEach((row, index) => {
                traces.push({
                    x: [row.Start, row.Deadline],
                    y: [row.Grant, row.Grant],
                    type: 'scatter',
                    mode: 'lines',
                    line: { width: 20, color: row.Stage === 'Submitted' ? '#34d399' : '#fbbf24' },
                    name: row.Stage,
                    showlegend: index === 0
                });
            });

            const layout = { 
                ...layoutTemplate, 
                title: 'Línea de Tiempo de Subsidios',
                xaxis: { type: 'date', gridcolor: '#334155' },
                yaxis: { autorange: 'reversed' }
            };
            Plotly.newPlot('chart-grants', traces, layout);
        }
    });

    // 3. CARGAR Y GENERAR TABLA DE OPORTUNIDADES
    Papa.parse('/batcave-dashboard/data/opportunities.csv', {
        download: true,
        header: true,
        complete: function(results) {
            const data = results.data;
            if(data.length === 0) return;

            let tableHtml = '<table><thead><tr>';
            // Cabeceras
            Object.keys(data[0]).forEach(key => tableHtml += `<th>${key}</th>`);
            tableHtml += '</tr></thead><tbody>';

            // Filas
            data.forEach(row => {
                if(Object.values(row).some(x => x)) { // Evitar filas vacías
                    tableHtml += '<tr>';
                    Object.values(row).forEach(val => tableHtml += `<td>${val || ''}</td>`);
                    tableHtml += '</tr>';
                }
            });
            tableHtml += '</tbody></table>';
            document.getElementById('table-opportunities').innerHTML = tableHtml;
        }
    });
</script>

</body>
</html>
